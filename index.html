<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Value Realization Framework</title>
  <link rel="stylesheet" href="css/styles.css?v=20260519-phase4-neutral-cards" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Local facilitator workspace</p>
        <h1>AI Value Realization Framework</h1>
      </div>
      <div class="toolbar">
        <span id="saveStatus" class="save-status">Not saved yet</span>
        <button id="exportPhaseBtn" type="button">Export current phase</button>
        <button id="exportWorkspaceBtn" type="button">Export workspace</button>
        <label class="file-button">
          Import JSON
          <input id="importFile" type="file" accept="application/json,.json" />
        </label>
        <button id="resetBtn" class="danger" type="button">Reset</button>
      </div>
    </header>

    <nav id="phaseNav" class="phase-nav" aria-label="Framework phases"></nav>

    <main id="phaseRoot" class="phase-root" tabindex="-1"></main>
  </div>

  <script type="module" src="js/app.js?v=20260519-phase4-neutral-cards"></script>
</body>
</html>
